<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- ✅ Monetag SDK -->
  <script src="https://libtl.com/sdk.js" data-zone="10913884" data-sdk="show_10913884"></script>
</head>

<body style="text-align: center; font-family: sans-serif; padding-top: 50px; background-color: #f4f4f9;">
  <h3 id="status">🔓 Unlock Content</h3>
  <p id="instruction">Watch a short ad to receive your file.</p>

  <!-- Styled button for better UX -->
  <button id="adBtn" onclick="runAd()" style="padding: 15px 30px; font-size: 18px; background: #0088cc; color: white; border: none; border-radius: 8px; cursor: pointer;">
    🎬 Watch Ad to Unlock
  </button>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    async function runAd() {
        const status = document.getElementById("status");
        
        if (typeof show_10913884 === "function") {
            status.innerText = "⏳ Loading Ad...";

            try {
                await show_10913884();
                
                // SUCCESS LOGIC
                status.innerText = "✅ Verification Success!";
                
                // CRITICAL: This sends the string to the bot's 'on message' handler
                // It only works because we are using a Reply Keyboard Button now
                tg.sendData("unlock:" + token); 
                
                // Close the WebApp
                setTimeout(() => {
                    tg.close();
                }, 500);

            } catch (err) {
                status.innerText = "⚠️ Ad failed or was skipped.";
            }
        } else {
            status.innerText = "❌ SDK Error";
        }
    }
</script>
</body>
</html>

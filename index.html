<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <!-- ✅ Monetag SDK for Zone 10914537 -->
  <script src="https://libtl.com/sdk.js" data-zone="10914537" data-sdk="show_10914537"></script>

  <style>
    body { 
      text-align: center; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
      padding-top: 60px; 
      background-color: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
    }
    #timer { font-size: 48px; font-weight: bold; color: #0088cc; margin: 20px 0; }
    #status { font-size: 18px; margin-bottom: 30px; opacity: 0.8; }
    #actionBtn {
      padding: 18px 35px;
      font-size: 20px;
      font-weight: bold;
      background: #808080;
      color: white;
      border: none;
      border-radius: 15px;
      width: 85%;
      transition: all 0.3s ease;
    }
    #actionBtn.ready { background: #28a745; cursor: pointer; box-shadow: 0 4px 15px rgba(40,167,69,0.3); }
  </style>
</head>

<body>
  <div id="status">Please wait for the content to unlock...</div>
  <div id="timer">--</div>
  <button id="actionBtn" disabled>🔒 Locked</button>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const params = new URLSearchParams(window.location.search);
    let timeLeft = parseInt(params.get("delay")) || 10;
    
    const btn = document.getElementById("actionBtn");
    const timerDisplay = document.getElementById("timer");
    const statusDisplay = document.getElementById("status");

    // Start Countdown
    const countdown = setInterval(() => {
      timeLeft--;
      if (timeLeft <= 0) {
        clearInterval(countdown);
        timerDisplay.innerText = "✅";
        statusDisplay.innerText = "Content Unlocked! Watch ad to finish.";
        btn.disabled = false;
        btn.innerText = "🚀 Watch Ad & Unlock";
        btn.classList.add("ready");
      } else {
        timerDisplay.innerText = timeLeft + "s";
      }
    }, 1000);

    btn.onclick = () => {
      btn.disabled = true;
      btn.innerText = "Loading Ad...";

      // ✅ Method 2: Rewarded Popup Logic
      if (typeof show_10914537 === "function") {
        show_10914537('pop').then(() => {
          // Ad watched successfully or closed
          statusDisplay.innerText = "✨ Success! Return to the bot.";
          btn.innerText = "Closing...";
          setTimeout(() => { tg.close(); }, 1000);
        }).catch(e => {
          // Ad failed
          statusDisplay.innerText = "⚠️ Ad failed. Try again.";
          btn.disabled = false;
          btn.innerText = "🚀 Watch Ad & Unlock";
        });
      } else {
        alert("Ad Engine not loaded. Please check your connection.");
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>

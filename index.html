<!DOCTYPE html>
<html>
<head>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- ✅ Monetag script -->

          data-zone='10913884'
          data-sdk='show_10913884'></script>
</head>

<body>
  <h3 id="status">🔓 Click below to unlock</h3>

  <button onclick="runAd()">🎬 Watch Ad</button>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    function runAd() {
      if (typeof show_10913884 === "function") {
        document.getElementById("status").innerText = "⏳ Loading ad...";

        show_10913884().then(() => {
          document.getElementById("status").innerText = "✅ Ad completed";

          // send unlock immediately
          tg.sendData("unlock:" + token);
          tg.close();

        }).catch(() => {
          document.getElementById("status").innerText = "⚠️ Ad failed. Try again.";
        });

        show_10913884().then(() => {
            adCompleted = true;
            document.getElementById("continueBtn").style.display = "block";
        });

      } else {
        document.getElementById("status").innerText = "❌ Ad SDK not loaded";
      }
    }
  </script>
</body>
</html>

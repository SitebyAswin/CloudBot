<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://libtl.com/sdk.js" data-zone="10913884" data-sdk="show_10913884"></script>

  <style>
    body { text-align: center; font-family: sans-serif; padding-top: 50px; 
           background-color: var(--tg-theme-bg-color, #ffffff); color: var(--tg-theme-text-color, #000000); }
    #actionBtn { padding: 15px 30px; font-size: 18px; font-weight: bold; background: #808080; 
                 color: white; border: none; border-radius: 12px; width: 80%; transition: 0.3s; }
    #actionBtn.ready { background: #0088cc; cursor: pointer; }
    #timer { font-size: 24px; color: #d9534f; font-weight: bold; margin-bottom: 10px; }
  </style>
</head>

<body>
  <h3 id="status">🔒 Content Locked</h3>
  <div id="timer">--</div>
  <button id="actionBtn" disabled>Please wait...</button>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const params = new URLSearchParams(window.location.search);
    let timeLeft = parseInt(params.get("delay")) || 10;
    
    const btn = document.getElementById("actionBtn");
    const timerDisplay = document.getElementById("timer");
    const status = document.getElementById("status");

    // Countdown logic
    const countdown = setInterval(() => {
      timeLeft--;
      timerDisplay.innerText = timeLeft + "s";
      
      if (timeLeft <= 0) {
        clearInterval(countdown);
        timerDisplay.innerText = "✅ Time Up!";
        status.innerText = "🔓 Ready to Unlock";
        btn.disabled = false;
        btn.innerText = "🎬 Watch Ad & Finish";
        btn.classList.add("ready");
      } else {
        timerDisplay.innerText = timeLeft + "s";
      }
    }, 1000);

    async function handleBtnClick() {
      if (typeof show_10913884 === "function") {
        btn.disabled = true;
        btn.innerText = "Loading Ad...";
        try {
          await show_10913884();
          tg.close(); // Close WebApp, user then clicks "Verify" in bot
        } catch (err) {
          alert("Ad failed. Please try again.");
          btn.disabled = false;
        }
      }
    }

    btn.onclick = handleBtnClick;
  </script>
</body>
</html>

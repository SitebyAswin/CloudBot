<!DOCTYPE html>
<html>
<head>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- ✅ Monetag script -->
  <script src='//libtl.com/sdk.js'
          data-zone='10913884'
          data-sdk='show_10913884'></script>
</head>

<body>
  <h3 id="status">🔄 Loading ad...</h3>
  <button id="continueBtn" style="display:none;" onclick="continueToBot()">
    Continue
  </button>

  <script>
    const tg = window.Telegram.WebApp;
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    let adCompleted = false;

    function runAd() {
    if (typeof show_10913884 === "function") {
        show_10913884().then(() => {
        tg.sendData("unlock:" + token);
        }).catch(() => {
        alert("Ad not completed");
        });
    }
    }

    window.onload = runAd;

    function continueToBot() {
      if (!adCompleted) {
        alert("❌ Watch ad first");
        return;
      }

      tg.sendData("unlock:" + token);
      tg.close();
    }
  </script>
</body>
</html>
